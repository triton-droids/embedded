motor_control_node:
  ros__parameters:
    default_can_interface: "can0"
    default_master_id: 255

    FREQ_HZ: 0.8
    KP: 10.0
    KD: 0.2
    MAX_VEL_RAD_S: 4.5

    # The fake motor node and SDK demos only need joint names.
    # Replace motor_id values with the real hardware CAN IDs before deploying
    # to physical motors.
    inversion: [1, 1, 1, 1]

    motors:
      base_to_shoulder_joint:
        can_interface: "can0"
        master_id: 255
        motor_id: 21
        actuator_type: 2
        model: "rs-03"
        direction: 1
        min_position: -1.57
        max_position: 1.57
        kp: 40.0
        kd: 1.5
      shoulder_to_upper_arm_joint:
        can_interface: "can0"
        master_id: 255
        motor_id: 22
        actuator_type: 2
        model: "rs-03"
        direction: 1
        min_position: -1.57
        max_position: 1.57
        kp: 40.0
        kd: 1.5
      upper_arm_to_lower_arm_joint:
        can_interface: "can0"
        master_id: 255
        motor_id: 23
        actuator_type: 2
        model: "rs-03"
        direction: 1
        min_position: -1.57
        max_position: 1.57
        kp: 40.0
        kd: 1.5
      lower_arm_to_wrist_joint:
        can_interface: "can0"
        master_id: 255
        motor_id: 24
        actuator_type: 2
        model: "rs-03"
        direction: 1
        min_position: -1.57
        max_position: 1.57
        kp: 40.0
        kd: 1.5
